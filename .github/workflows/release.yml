name: Build and Release Superb POS

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

# Give the workflow token write access to create releases
permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false   # Windows won't cancel if Mac fails
      matrix:
        os: [windows-latest, macos-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm ci
          cd server && npm ci

      - name: Build frontend
        run: npm run build:frontend

      - name: Build backend server
        run: npm run build:server

      - name: Build and Publish Electron release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npx electron-builder --publish always
